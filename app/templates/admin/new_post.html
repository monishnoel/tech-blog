{% extends "base.html" %}

{% block title %}Create New Post - Admin{% endblock %}

{% block content %}
<div class="admin-layout">
    <aside class="admin-sidebar">
        <h3>Admin Panel</h3>
        <ul class="admin-menu">
            <li><a href="{{ url_for('admin.dashboard') }}">Dashboard</a></li>
            <li><a href="{{ url_for('admin.manage_posts') }}" class="active">Manage Posts</a></li>
            <li><a href="{{ url_for('admin.manage_comments') }}">Manage Comments</a></li>
        </ul>
    </aside>

    <main class="admin-content">
        <h1>Create New Post</h1>

        <form method="POST" class="post-form">
            <div class="form-group">
                <label for="title">Title *</label>
                <input type="text" id="title" name="title" required maxlength="200">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="category">Category</label>
                    <input type="text" id="category" name="category" value="General" maxlength="100">
                </div>
                <div class="form-group">
                    <label for="tags">Tags (comma-separated)</label>
                    <input type="text" id="tags" name="tags" placeholder="python, web, tutorial" maxlength="500">
                </div>
            </div>

            <div class="form-group">
                <label for="excerpt">Excerpt</label>
                <textarea id="excerpt" name="excerpt" rows="3" maxlength="500" placeholder="Brief summary of the post"></textarea>
            </div>

            <div class="form-group">
                <label for="content">Content *</label>
                <textarea id="content" name="content" rows="15" required placeholder="Write your post content here (supports Markdown)"></textarea>
                <small>Markdown formatting is supported</small>
            </div>

            <div class="form-group checkbox">
                <input type="checkbox" id="is_published" name="is_published">
                <label for="is_published">Publish immediately</label>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Create Post</button>
                <a href="{{ url_for('admin.manage_posts') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </main>
</div>
{% endblock %}
